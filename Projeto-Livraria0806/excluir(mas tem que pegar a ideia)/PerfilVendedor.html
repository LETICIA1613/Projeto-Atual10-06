<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Vendedor</title>
    <link rel="stylesheet" href="PerfilVendedor.css">
</head>
<body>

<div class="container">

    <!-- PERFIL -->
    <div class="perfil">
        <img src="img/capa.jpg" alt="Foto da Loja">

        <div class="info">
            <h2>Nome da Lojinha</h2>
            <p class="vendas">Produtos vendidos: 40</p>
            <div class="avaliacao">
                <span>★★★★★</span>
                <p>5.0</p>
            </div>
        </div>
    </div>

    <!-- AÇÕES -->
    <div class="acoes">

        <div class="card">
            <span>🏪</span>
            <p>Ver Lojinha</p>
        </div>

        <div class="card">
            <span>📦</span>
            <p>Estoque</p>
        </div>

        <div class="card">
            <span>💬</span>
            <p>Chat</p>
        </div>

        <div class="card">
            <span>➕</span>
            <p>Adicionar Produto</p>
        </div>

    </div>

</div>

</body>
</html>
