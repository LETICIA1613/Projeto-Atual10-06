<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reembolsos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Reembolso.css">
</head>
<body>

<div class="header">
    Home → Histórico de vendas → Reembolsos 🔍
</div>

<div class="container">

<h3>💸 Solicitações de Reembolso (0)</h3>

<div class="status">
    <button>Pendentes</button>
    <button>Aprovados</button>
    <button>Concluídos</button>
</div>

<div class="card">
    <p><strong>Pedido #0</strong> | Solicitado: --/--</p>
    <p><strong>Cliente:</strong> Nome do cliente</p>

    <div class="box">
        <p><strong>Livro:</strong> Nome do livro <span style="float:right">R$ 0,00</span></p>
        <p><strong>Motivo:</strong> ---</p>
        <p><strong>Evidência:</strong> ---</p>
    </div>

    <p><strong>Prazo para resposta:</strong> -- dias</p>

    <div class="actions">
        <button>Aprovar reembolso</button>
        <button>Recusar</button>
        <button>Chat</button>
    </div>
</div>

<div class="summary">
    <p><strong>Total reembolsado no mês:</strong> R$ 0,00</p>
    <p><strong>Taxa de reembolso:</strong> 0% das vendas</p>
</div>

</div>

</body>
</html>
