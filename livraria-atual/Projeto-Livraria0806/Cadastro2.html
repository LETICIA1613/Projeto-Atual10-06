<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria</title>
    <link rel="stylesheet" href="Cadastro2.css">
</head>

<body>

<h2 class="titulo">Cadastre o Endereço:</h2>

<div class="card">

    <div class="card-topo">
        <span class="estrela">✦</span>
        <h1>Livraria</h1>
        <div class="bolinhas">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <form class="form">

        <select name="pais" required>
            <option value="">Selecione seu país</option>
            <option value="BR">Brasil</option>
            <option value="US">Estados Unidos</option>
            <option value="ES">Espanha</option>
            <option value="FR">França</option>
        </select>

        <input type="text" name="nomecompleto" placeholder="Nome Completo" required>

        <input type="tel" name="telefone" placeholder="Telefone (00)00000-0000">

        <input type="text" name="cep" placeholder="CEP">

        <input type="text" name="rua" placeholder="Rua">

        <input type="text" name="bairro" placeholder="Bairro">

        <input type="number" name="numeroresidencial" placeholder="Número Residencial">

        <input type="text" name="complemento" placeholder="Complemento">

        <input type="text" name="cidade" placeholder="Cidade">

        <input type="text" name="estado" placeholder="Estado">

        <div class="botoes">
            <button type="button" onclick="window.location.href='Cadastro1.html'">Voltar</button>
            <button type="button" onclick="window.location.href='FazerPedido.html'">Próximo</button>
            <button type="button" class="pular" onclick="window.location.href='Entrar.html'">Pular</button>
        </div>

    </form>

</div>

</body>
</html>
