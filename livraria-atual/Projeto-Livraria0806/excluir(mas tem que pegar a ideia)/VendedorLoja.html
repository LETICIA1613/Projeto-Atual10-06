<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel da Loja</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* BASE */
body {
    font-family: Arial;
    background: #f4f6f9;
}

/* BANNER */
.banner {
    height: 220px;
    background: linear-gradient(135deg, #8C031C, #BF6980);
}

/* PERFIL */
.perfil-container {
    background: white;
    margin: -70px auto 30px;
    padding: 30px;
    border-radius: 20px;
    max-width: 1100px;
    display: flex;
    gap: 20px;
    align-items: center;
}

.foto {
    width: 100px;
    border-radius: 15px;
}

.info h2 {
    color: #8C031C;
}

.actions {
    margin-left: auto;
}

.btn {
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    color: white;
}

.btn-edit { background: #007bff; }
.btn-add { background: #28a745; }

/* DASHBOARD */
.dashboard {
    max-width: 1100px;
    margin: auto;
    display: flex;
    gap: 15px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* LIVROS */
.livros {
    max-width: 1100px;
    margin: 30px auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 20px;
}

.livro {
    background: white;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

.livro img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.livro button {
    margin: 5px;
    padding: 5px 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.edit { background: orange; color:white; }
.delete { background: red; color:white; }

/* AVALIAÇÕES */
.avaliacoes {
    max-width: 1100px;
    margin: auto;
}

.comentario {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 10px;
}

.responder {
    background: #8C031C;
    color: white;
    padding: 5px 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="banner"></div>

<!-- PERFIL -->
<div class="perfil-container">
    <img src="img/capa.jpg" class="foto">

    <div class="info">
        <h2>Minha Livraria</h2>
        <p>★★★★★ 4.8</p>
        <p>📦 120 vendas</p>
        <p>📚 45 livros</p>
    </div>

    <div class="actions">
        <button class="btn btn-edit">Editar Perfil</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
    <div class="card">
        <h3>💰 Hoje</h3>
        <p>R$ 1.200</p>
    </div>
    <div class="card">
        <h3>📦 Pedidos</h3>
        <p>15</p>
    </div>
    <div class="card">
        <h3>⭐ Avaliação</h3>
        <p>4.8</p>
    </div>
</div>

<!-- LIVROS -->
<div class="livros">
    <h2>📚 Meus Livros</h2>
    <button class="btn btn-add">+ Adicionar Livro</button>

    <div class="grid">

        <div class="livro">
            <img src="img/capa.jpg">
            <p>Livro 1</p>
            <strong>R$ 30</strong><br>

            <button class="edit">Editar</button>
            <button class="delete">Excluir</button>
        </div>

        <div class="livro">
            <img src="img/capa.jpg">
            <p>Livro 2</p>
            <strong>R$ 40</strong><br>

            <button class="edit">Editar</button>
            <button class="delete">Excluir</button>
        </div>

    </div>
</div>

<!-- AVALIAÇÕES -->
<div class="avaliacoes">
    <h2>⭐ Avaliações dos Clientes</h2>

    <div class="comentario">
        <p><strong>Maria:</strong> Excelente livro!</p>
        <button class="responder">Responder</button>
    </div>

    <div class="comentario">
        <p><strong>João:</strong> Entrega rápida!</p>
        <button class="responder">Responder</button>
    </div>

</div>

</body>
</html>
